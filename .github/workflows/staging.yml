name: Deploy Recruitment AI on Staging

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #for improving relevancy of reporting

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install 
      
      # - name: Type-check
      #   run: bun tsc --noEmit

      # - name: Run ESLint
      #   run: bun run lint

      # - name: Run Unit Tests
      #   run: bun run test:ci

      # - name: SonarQube Scan
      #   uses: kitabisa/sonarqube-action@v1.2.0
      #   with:
      #     host: ${{ secrets.SONARQUBE_HOST }}
      #     login: ${{ secrets.SONARQUBE_TOKEN }}
  
  build:
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Inject .env Configuration
        env:
          ENV_FILE: ${{ secrets.ENV_STAGING_TESTING }}
        run: |
          echo $ENV_FILE | tr " " "\n" >> .env

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESSKEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESSKEY }}
          aws-region: ${{ secrets.AWS_REGION_SIN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: recruitment-ai-dev
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REPOSITORY .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESSKEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESSKEY }}
          aws-region: ${{ secrets.AWS_REGION_SIN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'   

      - name: Restart K8 Deployment
        id: kubectl
        uses: ianbelcher/eks-kubectl-action@master
        with:
          cluster_name: ${{ secrets.CLUSTER_NAME_TESTING }}
          args: rollout restart deployment/${{ secrets.DEPLOYMENT_NAME_TESTING }} -n ${{ secrets.NAMESPACE_TESTING }}
  
  create_pr_repo_sync:
    needs: build
    runs-on: ubuntu-latest

    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Create pull request
        id: open-pr
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: "deployment"
          pr_title: "Auto PR: From staging Branch"
          pr_template: ".github/pull_request_template.md"
          pr_reviewer: "downey88"